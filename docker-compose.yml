services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: db
      DB_USER: tetris
      DB_PASSWORD: ${DB_PASSWORD:-tetris}
      DB_NAME: tetris
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: tetris
      MARIADB_USER: tetris
      MARIADB_PASSWORD: ${DB_PASSWORD:-tetris}
    volumes:
      - tetris_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tetris_db:
